<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紅包紀錄簿 - 軒霆 & 品妍</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #EAE7DC; --main-bg: #F9F7F2; --text-color: #4A4A4A; --accent-color: #8E8D8A; --border-gold: #D8C3A5; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--main-bg); color: var(--text-color); display: flex; }
        .sidebar { width: 220px; height: 100vh; background-color: var(--sidebar-bg); padding: 30px 20px; position: fixed; border-right: 1px solid var(--border-gold); overflow-y: auto; z-index: 100; }
        .nav-item { display: block; padding: 12px 15px; color: var(--text-color); text-decoration: none; margin-bottom: 8px; border-radius: 8px; transition: 0.3s; font-weight: 300; font-size: 0.9em; }
        .nav-item:hover { background-color: var(--border-gold); color: white; }
        .content { margin-left: 260px; padding: 40px; width: 100%; max-width: 900px; }
        .year-section { margin-bottom: 50px; scroll-margin-top: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-top: 5px solid var(--border-gold); }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .total-amount { font-size: 1.4rem; font-weight: 700; color: var(--accent-color); }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 0.95em; }
        .import-btn { background: #8E8D8A; color: white; border: none; padding: 15px 25px; border-radius: 30px; cursor: pointer; margin-bottom: 30px; font-weight: bold; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 10px; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border-gold); }
            .sidebar h2 { display: none; }
            .content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2 style="font-size:1.2rem; color:var(--accent-color);">目錄載入中...</h2>
</div>

<div class="content">
    <button class="import-btn" id="importBtn">🚀 點我：同步所有歷史紀錄到 Firebase</button>
    <div id="main-display">正在從資料庫同步數據...</div>
</div>

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqSxxH5LhsKSV2NPDzQFOSHn_rQNv588k",
        authDomain: "url-sorting.firebaseapp.com",
        databaseURL: "https://url-sorting-default-rtdb.firebaseio.com",
        projectId: "url-sorting",
        storageBucket: "url-sorting.firebasestorage.app",
        messagingSenderId: "576779796443",
        appId: "1:576779796443:web:7ca769a6ba6a4937e0f1fe",
        measurementId: "G-L6KGR186WB"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 自動讀取並顯示資料 ---
    async function loadData() {
        const sidebar = document.getElementById('sidebar');
        const display = document.getElementById('main-display');
        sidebar.innerHTML = '<h2 style="font-size:1.2rem; color:var(--accent-color);">紅包目錄</h2>';
        display.innerHTML = '';

        const q = query(collection(db, "lucky_money"), orderBy("year", "desc"), orderBy("owner", "asc"));
        const snapshot = await getDocs(q);

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            
            // 側邊欄
            const nav = document.createElement('a');
            nav.href = `#${id}`;
            nav.className = 'nav-item';
            nav.innerText = `${data.owner} ${data.year}年`;
            sidebar.appendChild(nav);

            // 內容卡片
            let total = 0;
            let items = data.records.map(r => {
                total += r.amount;
                return `<div class="item"><span>${r.name}</span><span>$${r.amount}</span></div>`;
            }).join('');

            const card = document.createElement('div');
            card.id = id;
            card.className = 'year-section';
            card.innerHTML = `
                <div class="card">
                    <div class="header-row">
                        <h3 style="margin:0">${data.owner} ${data.year}年</h3>
                        <div class="total-amount">NT$ ${total.toLocaleString()}</div>
                    </div>
                    <div class="list-grid">${items}</div>
                </div>`;
            display.appendChild(card);
        });
    }

    // --- 一鍵匯入所有歷史資料 ---

        const btn = document.getElementById('importBtn');
        btn.innerText = "寫入中，請稍候...";
        btn.disabled = true;

            { id: "115_PY", owner: "品妍", year: 115, records: [{name:"爸",amount:1200},{name:"媽",amount:1200},{name:"育弘爸",amount:2600},{name:"育弘媽",amount:2600},{name:"育弘舅媽",amount:2000},{name:"大叔叔",amount:2000},{name:"小叔叔",amount:1000},{name:"大姑姑",amount:800},{name:"二姑姑",amount:800},{name:"小姑姑",amount:600},{name:"冠霖",amount:600},{name:"琬薏媽",amount:2000},{name:"大姨婆",amount:2000},{name:"小姨婆",amount:200},{name:"舅公",amount:600},{name:"大姨",amount:1200},{name:"二姨",amount:600},{name:"舅舅",amount:600},{name:"苓苓",amount:200},{name:"如琴",amount:200},{name:"阿義伯公",amount:2000}] },
            // 114年
            { id: "114_XT", owner: "軒霆", year: 114, records: [{name:"爸",amount:1200},{name:"媽",amount:1200},{name:"阿公",amount:2600},{name:"奶奶",amount:2600},{name:"大叔",amount:2000},{name:"小叔",amount:600},{name:"舅公",amount:2000},{name:"大姑姑",amount:600},{name:"二姑姑",amount:600},{name:"三姑姑",amount:600},{name:"表叔",amount:600},{name:"姨婆祖",amount:1000},{name:"阿嬤",amount:2000},{name:"大姨婆",amount:2000},{name:"小姨婆",amount:200},{name:"大姨",amount:1600},{name:"二姨",amount:600},{name:"舅舅",amount:600},{name:"家錢舅舅",amount:200},{name:"寧聆阿姨",amount:200},{name:"舅公",amount:1200},{name:"如琴",amount:600}] },

            // 110年
            { id: "110_XT", owner: "軒霆", year: 110, records: [{name:"育弘爸媽",amount:2600},{name:"宗翰",amount:600},{name:"大表姐",amount:1200},{name:"二表姐",amount:1000},{name:"外婆",amount:2000},{name:"宗翰朋友",amount:200},{name:"大姨",amount:2000},{name:"裝潢叔叔",amount:1200},{name:"育弘",amount:1200},{name:"琬薏",amount:1200}] },
            { id: "110_PY", owner: "品妍", year: 110, records: [{name:"育弘爸媽",amount:2600},{name:"宗翰",amount:600},{name:"大表姐",amount:1200},{name:"二表姐",amount:1000},{name:"外婆",amount:2000},{name:"宗翰朋友",amount:200},{name:"大姨",amount:2000},{name:"裝潢叔叔",amount:1200},{name:"育弘",amount:1200},{name:"琬薏",amount:1200}] },
            // 109年
            { id: "109_XT", owner: "軒霆", year: 109, records: [{name:"爸爸",amount:1200},{name:"媽媽",amount:1200},{name:"育弘爸",amount:3600},{name:"育弘媽",amount:3600},{name:"大弟",amount:2000},{name:"小弟",amount:1000},{name:"舅媽",amount:2000},{name:"詩涵",amount:600},{name:"詩萍",amount:600},{name:"珮綾",amount:600},{name:"冠霖",amount:600},{name:"薏媽",amount:3600},{name:"大姨",amount:1600},{name:"大表姐",amount:1600},{name:"表哥",amount:600},{name:"二表姐",amount:600},{name:"表妹",amount:100},{name:"舅舅",amount:1000},{name:"裝潢叔叔",amount:1200}] }
        ];

        for (const data of allRecords) {
            await setDoc(doc(db, "lucky_money", data.id), {
                owner: data.owner,
                year: data.year,
                records: data.records
            });
        }
        alert("✨ 同步成功！網頁將自動重整。");
        location.reload();
    });

    loadData();
</script>
</body>
</html>
