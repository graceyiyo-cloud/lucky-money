<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紅包大管家 - 軒霆 & 品妍</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #EAE7DC; --main-bg: #F9F7F2; --text-color: #4A4A4A; --accent-color: #8E8D8A; --card-white: #FFFFFF; --border-gold: #D8C3A5; --item-bg: #FDFCFB; --red: #E85A4F; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--main-bg); color: var(--text-color); display: flex; line-height: 1.6; }
        .sidebar { width: 240px; height: 100vh; background-color: var(--sidebar-bg); padding: 40px 20px; position: fixed; border-right: 1px solid var(--border-gold); overflow-y: auto; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.1rem; color: var(--accent-color); margin-bottom: 25px; letter-spacing: 2px; text-align: center; border-bottom: 1px solid var(--border-gold); padding-bottom: 15px; }
        .nav-item { display: block; padding: 12px 18px; color: var(--text-color); text-decoration: none; margin-bottom: 10px; border-radius: 12px; transition: 0.3s; font-weight: 300; font-size: 0.9em; background: rgba(255,255,255,0.3); }
        .nav-item:hover { background-color: var(--border-gold); color: white; }
        .content { margin-left: 240px; padding: 50px; width: 100%; max-width: 1000px; box-sizing: border-box; }
        .year-section { margin-bottom: 60px; scroll-margin-top: 30px; }
        .card { background: var(--card-white); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(216, 195, 165, 0.3); position: relative; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--border-gold); border-radius: 20px 20px 0 0; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid var(--main-bg); padding-bottom: 15px; }
        .total-amount { font-size: 1.8rem; font-weight: 700; color: var(--accent-color); font-family: 'JetBrains Mono', monospace; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: var(--item-bg); padding: 12px 18px; border-radius: 10px; border: 1px solid #F0EDE5; position: relative; }
        .editable-name { cursor: pointer; border-bottom: 1px dashed transparent; transition: 0.2s; color: #777; font-weight: 400; order: 1; }
        .editable-name:hover { border-bottom: 1px dashed var(--border-gold); color: var(--border-gold); }
        .amount-display { color: var(--text-color); font-weight: 600; font-family: 'JetBrains Mono', monospace; order: 3; cursor: pointer; border-bottom: 1px dashed var(--border-gold); }
        .item::after { content: ""; flex: 1; border-bottom: 1px dotted var(--border-gold); margin: 0 12px; order: 2; opacity: 0.5; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; cursor: pointer; display: none; }
        .item:hover .del-btn { display: block; }
        .add-person-btn { width: 100%; margin-top: 20px; padding: 10px; border: 2px dashed var(--border-gold); background: none; color: var(--accent-color); border-radius: 10px; cursor: pointer; font-weight: bold; }
        /* 統計卡片 */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stats-card { background: linear-gradient(135deg, #EAE7DC 0%, #D8C3A5 100%); padding: 20px; border-radius: 15px; text-align: center; }
        .grand-total { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono'; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        .stats-table th { padding: 10px; background: #eee; }
        .stats-table td { padding: 10px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .admin-actions { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .action-btn { background: var(--accent-color); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-size: 24px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; backdrop-filter: blur(4px); }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 320px; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 10px; display: flex; overflow-x: auto; z-index: 1000; }
            .sidebar h2 { display: none; }
            .content { margin-left: 0; padding: 20px; }
            .stats-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>
<div class="content" id="main-content"><div id="main-display"></div></div>

<div class="admin-actions"><button class="action-btn" onclick="openModal()">+</button></div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>建立年度範本</h3>
        <input type="number" id="newYearInput" value="116" style="width:100%; padding:10px; margin-bottom:15px;">
        <input type="number" id="sourceYearInput" value="115" style="width:100%; padding:10px; margin-bottom:15px;">
        <button onclick="handleCreateTemplate()" style="width:100%; background:var(--border-gold); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">確認建立 (名單同步/金額歸零)</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px;">取消</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqSxxH5LhsKSV2NPDzQFOSHn_rQNv588k",
        authDomain: "url-sorting.firebaseapp.com",
        projectId: "url-sorting",
        storageBucket: "url-sorting.firebasestorage.app",
        messagingSenderId: "576779796443",
        appId: "1:576779796443:web:7ca769a6ba6a4937e0f1fe",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadData() {
        const sidebar = document.getElementById('sidebar');
        const display = document.getElementById('main-display');
        const q = query(collection(db, "lucky_money"), orderBy("year", "desc"), orderBy("owner", "asc"));
        const snapshot = await getDocs(q);
        
        let stats = {}, totals = {"軒霆":0, "品妍":0};
        sidebar.innerHTML = "<h2>年度目錄</h2>";
        const sNav = document.createElement('a'); sNav.className='nav-item'; sNav.href='#stats-page'; sNav.innerText='📈 全年度統計'; sNav.style.background='#D8C3A5'; sNav.style.color='white';
        sidebar.appendChild(sNav);
        display.innerHTML = "";

        const statsSection = document.createElement('div'); statsSection.id="stats-page"; statsSection.className="year-section";

        snapshot.forEach(docSnap => {
            const data = docSnap.data(), id = docSnap.id;
            if(!stats[data.year]) stats[data.year] = {};
            let yTotal = data.records.reduce((s,r)=>s+r.amount,0);
            stats[data.year][data.owner] = yTotal; totals[data.owner]+=yTotal;

            const nav = document.createElement('a'); nav.className='nav-item'; nav.href=`#${id}`; nav.innerText=`${data.owner} ${data.year}年`;
            sidebar.appendChild(nav);

            const card = document.createElement('div'); card.className='year-section'; card.id=id;
            const grid = document.createElement('div'); grid.className='list-grid';
            
            data.records.forEach((r, idx) => {
                const item = document.createElement('div'); item.className='item';
                item.innerHTML = `<span class="editable-name">${r.name}</span><span class="amount-display">$${r.amount.toLocaleString()}</span><button class="del-btn">✕</button>`;
                
                // 修改姓名
                item.querySelector('.editable-name').onclick = () => {
                    const newN = prompt("修改項目名稱：", r.name);
                    if(newN) { data.records[idx].name = newN; updateDoc(doc(db,"lucky_money",id), {records:data.records}).then(()=>loadData()); }
                };
                // 修改金額
                item.querySelector('.amount-display').onclick = () => {
                    const newA = prompt(`修改 ${r.name} 的金額：`, r.amount);
                    if(newA !== null) { data.records[idx].amount = parseInt(newA)||0; updateDoc(doc(db,"lucky_money",id), {records:data.records}).then(()=>loadData()); }
                };
                // 刪除人員
                item.querySelector('.del-btn').onclick = () => {
                    if(confirm(`確定要刪除 ${r.name} 嗎？`)) { data.records.splice(idx,1); updateDoc(doc(db,"lucky_money",id), {records:data.records}).then(()=>loadData()); }
                };
                grid.appendChild(item);
            });

            const addBtn = document.createElement('button'); addBtn.className='add-person-btn'; addBtn.innerText='＋ 新增人員';
            addBtn.onclick = () => {
                const n = prompt("輸入人員姓名：");
                const a = prompt("輸入紅包金額：", 0);
                if(n) { data.records.push({name:n, amount:parseInt(a)||0}); updateDoc(doc(db,"lucky_money",id), {records:data.records}).then(()=>loadData()); }
            };

            card.innerHTML = `<div class="card"><div class="header-row"><h3>${data.owner} ${data.year}年</h3><div class="total-amount">NT$ ${yTotal.toLocaleString()}</div></div></div>`;
            card.querySelector('.card').appendChild(grid);
            card.querySelector('.card').appendChild(addBtn);
            display.appendChild(card);
        });

        // 生成統計
        let rows = Object.keys(stats).sort((a,b)=>b-a).map(y=>`<tr><td>${y}年</td><td>$${(stats[y]["軒霆"]||0).toLocaleString()}</td><td>$${(stats[y]["品妍"]||0).toLocaleString()}</td></tr>`).join('');
        statsSection.innerHTML = `<div class="card"><div class="header-row"><h3>年度匯整統計</h3></div><div class="stats-container"><div class="stats-card"><h4>軒霆 生涯</h4><div class="grand-total">$${totals["軒霆"].toLocaleString()}</div></div><div class="stats-card"><h4>品妍 生涯</h4><div class="grand-total">$${totals["品妍"].toLocaleString()}</div></div></div><table class="stats-table"><thead><tr><th>年度</th><th>軒霆</th><th>品妍</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        display.prepend(statsSection);
    }

    window.openModal = () => document.getElementById('modalOverlay').style.display='block';
    window.closeModal = () => document.getElementById('modalOverlay').style.display='none';
    window.handleCreateTemplate = async () => {
        const nY = document.getElementById('newYearInput').value, sY = document.getElementById('sourceYearInput').value;
        for (const o of [{n:"軒霆",id:"XT"},{n:"品妍",id:"PY"}]) {
            const sS = await getDoc(doc(db,"lucky_money",`${sY}_${o.id}`));
            if(sS.exists()) await setDoc(doc(db,"lucky_money",`${nY}_${o.id}`), {owner:o.n, year:parseInt(nY), records:sS.data().records.map(r=>({name:r.name, amount:0}))});
        }
        location.reload();
    };
    loadData();
</script>
</body>
</html>
