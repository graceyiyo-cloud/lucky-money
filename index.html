<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紅包紀錄簿 - 軒霆 & 品妍</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #EAE7DC;
            --main-bg: #F9F7F2;
            --text-color: #4A4A4A;
            --accent-color: #8E8D8A;
            --card-white: #FFFFFF;
            --border-gold: #D8C3A5;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            display: flex;
        }

        /* 響應式側邊欄 */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            position: fixed;
            border-right: 1px solid var(--border-gold);
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .nav-item {
            display: block;
            padding: 12px 15px;
            color: var(--text-color);
            text-decoration: none;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 300;
        }

        .nav-item:hover {
            background-color: var(--border-gold);
            color: white;
        }

        /* 主內容區 */
        .content {
            margin-left: 260px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
        }

        .year-section {
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-top: 5px solid var(--border-gold);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .total-amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        /* 手機版適配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px;
                box-sizing: border-box;
                display: flex;
                overflow-x: auto;
                white-space: nowrap;
            }
            .sidebar h2 { display: none; }
            .nav-item { display: inline-block; margin-right: 10px; padding: 8px 15px; }
            .content { margin-left: 0; padding: 20px; box-sizing: border-box; }
            .list-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>紅包目錄</h2>
    <a href="#XT115" class="nav-item">軒霆 115年</a>
    <a href="#PY115" class="nav-item">品妍 115年</a>
    </div>

<div class="content">
    <div id="XT115" class="year-section">
        <div class="card">
            <div class="header-row">
                <h3 style="margin:0">軒霆 115年過年</h3>
                <div class="total-amount" id="total-XT115">NT$ 0</div>
            </div>
            <div class="list-grid">
                <div class="item"><span>爸</span><span class="amount">1200</span></div>
                <div class="item"><span>媽</span><span class="amount">1200</span></div>
                <div class="item"><span>育弘爸</span><span class="amount">2600</span></div>
                <div class="item"><span>育弘媽</span><span class="amount">2600</span></div>
                <div class="item"><span>育弘舅媽</span><span class="amount">2000</span></div>
                <div class="item"><span>大叔叔</span><span class="amount">2000</span></div>
            </div>
        </div>
    </div>

    <div id="PY115" class="year-section">
        <div class="card">
            <div class="header-row">
                <h3 style="margin:0">品妍 115年過年</h3>
                <div class="total-amount" id="total-PY115">NT$ 0</div>
            </div>
            <div class="list-grid">
                <div class="item"><span>爸</span><span class="amount">1200</span></div>
                <div class="item"><span>媽</span><span class="amount">1200</span></div>
                <div class="item"><span>育弘爸</span><span class="amount">2600</span></div>
                <div class="item"><span>育弘媽</span><span class="amount">2600</span></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqSxxH5LhsKSV2NPDzQFOSHn_rQNv588k",
        authDomain: "url-sorting.firebaseapp.com",
        databaseURL: "https://url-sorting-default-rtdb.firebaseio.com",
        projectId: "url-sorting",
        storageBucket: "url-sorting.firebasestorage.app",
        messagingSenderId: "576779796443",
        appId: "1:576779796443:web:7ca769a6ba6a4937e0f1fe",
        measurementId: "G-L6KGR186WB"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    // 自動加總邏輯
    function calculate() {
        const sections = document.querySelectorAll('.year-section');
        sections.forEach(section => {
            let sum = 0;
            const amounts = section.querySelectorAll('.amount');
            amounts.forEach(a => sum += parseInt(a.innerText));
            
            const display = section.querySelector('.total-amount');
            display.innerText = `NT$ ${sum.toLocaleString()}`;
        });
    }

    calculate();
</script>

</body>
</html>
