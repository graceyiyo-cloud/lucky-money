<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紅包紀錄簿 - 軒霆 & 品妍</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #EAE7DC; --main-bg: #F9F7F2; --text-color: #4A4A4A; --accent-color: #8E8D8A; --card-white: #FFFFFF; --border-gold: #D8C3A5; --item-bg: #FDFCFB; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--main-bg); color: var(--text-color); display: flex; line-height: 1.6; }
        .sidebar { width: 240px; height: 100vh; background-color: var(--sidebar-bg); padding: 40px 20px; position: fixed; border-right: 1px solid var(--border-gold); overflow-y: auto; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.1rem; color: var(--accent-color); margin-bottom: 30px; letter-spacing: 3px; text-align: center; border-bottom: 1px solid var(--border-gold); padding-bottom: 15px; }
        .nav-item { display: block; padding: 12px 18px; color: var(--text-color); text-decoration: none; margin-bottom: 10px; border-radius: 12px; transition: 0.3s; font-weight: 300; font-size: 0.95em; background: rgba(255,255,255,0.3); }
        .nav-item:hover { background-color: var(--border-gold); color: white; transform: translateX(5px); }
        .content { margin-left: 240px; padding: 50px; width: 100%; max-width: 1000px; box-sizing: border-box; }
        .year-section { margin-bottom: 60px; scroll-margin-top: 30px; }
        .card { background: var(--card-white); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(216, 195, 165, 0.3); position: relative; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--border-gold); border-radius: 20px 20px 0 0; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid var(--main-bg); padding-bottom: 15px; }
        .header-row h3 { margin: 0; font-size: 1.6rem; color: var(--accent-color); font-weight: 700; }
        .total-amount { font-size: 1.8rem; font-weight: 700; color: var(--accent-color); font-family: 'JetBrains Mono', monospace; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: var(--item-bg); padding: 12px 18px; border-radius: 10px; border: 1px solid #F0EDE5; }
        .item span:first-child { color: #777; font-weight: 400; order: 1; }
        /* 編輯金額樣式 */
        .amount-display { color: var(--text-color); font-weight: 600; font-family: 'JetBrains Mono', monospace; order: 3; cursor: pointer; border-bottom: 1px dashed var(--border-gold); transition: 0.2s; }
        .amount-display:hover { color: var(--border-gold); background: #fffceb; }
        .amount-input { width: 80px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 1em; padding: 2px 5px; border: 1px solid var(--border-gold); order: 3; }
        .item::after { content: ""; flex: 1; border-bottom: 1px dotted var(--border-gold); margin: 0 12px; order: 2; opacity: 0.5; }
        .admin-actions { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .action-btn { background: var(--accent-color); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-size: 24px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; backdrop-filter: blur(4px); }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 320px; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 15px; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border-gold); z-index: 1000; background: var(--sidebar-bg); }
            .sidebar h2 { display: none; }
            .nav-item { display: inline-block; margin-right: 10px; padding: 8px 15px; font-size: 0.85em; }
            .content { margin-left: 0; padding: 20px; }
            .list-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar"><h2>年度目錄</h2></div>
<div class="content" id="main-content"><div id="main-display"><p style="text-align:center; margin-top:100px;">連線中...</p></div></div>

<div class="admin-actions"><button class="action-btn" onclick="openModal()">+</button></div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>建立年度範本</h3>
        <label>目標新年度</label><input type="number" id="newYearInput" value="116" style="width:100%; padding:10px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
        <label>複製來源年度</label><input type="number" id="sourceYearInput" value="115" style="width:100%; padding:10px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
        <button onclick="handleCreateTemplate()" style="width:100%; background:var(--border-gold); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">確認建立 (金額歸零)</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;">取消</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqSxxH5LhsKSV2NPDzQFOSHn_rQNv588k",
        authDomain: "url-sorting.firebaseapp.com",
        projectId: "url-sorting",
        storageBucket: "url-sorting.firebasestorage.app",
        messagingSenderId: "576779796443",
        appId: "1:576779796443:web:7ca769a6ba6a4937e0f1fe",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 讀取資料並綁定編輯事件 ---
    async function loadData() {
        const sidebar = document.getElementById('sidebar');
        const display = document.getElementById('main-display');
        const q = query(collection(db, "lucky_money"), orderBy("year", "desc"), orderBy("owner", "asc"));
        const snapshot = await getDocs(q);
        
        sidebar.innerHTML = "<h2>年度目錄</h2>";
        display.innerHTML = "";

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;

            // 側邊欄
            const nav = document.createElement('a');
            nav.className = 'nav-item'; nav.href = `#${id}`; nav.innerText = `${data.owner} ${data.year}年`;
            sidebar.appendChild(nav);

            // 卡片
            let total = 0;
            const card = document.createElement('div');
            card.className = 'year-section'; card.id = id;
            
            const grid = document.createElement('div');
            grid.className = 'list-grid';
            
            data.records.forEach((r, index) => {
                total += r.amount;
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `<span>${r.name}</span>`;
                
                const amtSpan = document.createElement('span');
                amtSpan.className = 'amount-display';
                amtSpan.innerText = `$${r.amount.toLocaleString()}`;
                
                // 點擊編輯邏輯
                amtSpan.onclick = () => startEdit(id, index, r.amount, amtSpan, data.records, card);
                
                item.appendChild(amtSpan);
                grid.appendChild(item);
            });

            card.innerHTML = `<div class="card"><div class="header-row"><h3>${data.owner} ${data.year}年</h3><div class="total-amount">NT$ ${total.toLocaleString()}</div></div></div>`;
            card.querySelector('.card').appendChild(grid);
            display.appendChild(card);
        });
    }

    // --- 即時編輯功能 ---
    function startEdit(docId, index, oldVal, spanEl, records, cardEl) {
        const input = document.createElement('input');
        input.type = 'number'; input.className = 'amount-input'; input.value = oldVal;
        spanEl.replaceWith(input);
        input.focus();

        const save = async () => {
            const newVal = parseInt(input.value) || 0;
            if (newVal !== oldVal) {
                records[index].amount = newVal;
                await updateDoc(doc(db, "lucky_money", docId), { records: records });
                loadData(); // 重新讀取確保總金額更新
            } else {
                input.replaceWith(spanEl);
            }
        };

        input.onblur = save;
        input.onkeydown = (e) => { if(e.key === 'Enter') save(); };
    }

    // --- 複製範本功能 ---
    window.openModal = () => document.getElementById('modalOverlay').style.display = 'block';
    window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';
    window.handleCreateTemplate = async () => {
        const newYear = document.getElementById('newYearInput').value;
        const srcYear = document.getElementById('sourceYearInput').value;
        for (const o of [{n:"軒霆",id:"XT"}, {n:"品妍",id:"PY"}]) {
            const srcSnap = await getDoc(doc(db, "lucky_money", `${srcYear}_${o.id}`));
            if(srcSnap.exists()) {
                const newData = srcSnap.data().records.map(r => ({name:r.name, amount:0}));
                await setDoc(doc(db, "lucky_money", `${newYear}_${o.id}`), {owner:o.n, year:parseInt(newYear), records:newData});
            }
        }
        location.reload();
    };

    loadData();
</script>
</body>
</html>
